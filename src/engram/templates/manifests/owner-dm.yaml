# Owner-DM channel manifest template.
#
# Copied into contexts/<dm-channel-id>/.claude/channel-manifest.yaml on
# first provisioning. Full inheritance, user-level setting priming so the
# operator's personal MCPs (Linear, Gmail, etc.) are available.
#
# setting_sources=["user"] also drives the ~47% per-turn cost reduction
# validated on 2026-04-20. (See scripts/cost_experiment.py.)

channel_id: "{{channel_id}}"
identity: owner-dm-full
label: "DM"
status: active
meta_eligible: true

setting_sources: [user]

# Empty scope blocks = full inheritance from project-level .claude/
tools: {}
mcp_servers: {}
skills: {}

# Permission rules (native Claude Code `Tool(specifier)` syntax).
# Even on your own machine, a small deny list protects against accidental
# secret exfiltration if Claude decides to grep for config files.
# These are suggestions — edit freely to match your layout. The read-only
# allow-list removes HITL prompts for safe inspection-only tools; deny still
# wins when a specific rule matches.
permissions:
  allow:
    - Read
    - Grep
    - Glob
    - WebFetch
    - WebSearch
    - TodoWrite
  deny:
    - "Read(~/.ssh/**)"
    - "Read(~/.aws/**)"
    - "Read(~/.gnupg/**)"
    - "Read(**/.env*)"

behavior:
  style: balanced
  permission_mode: default
  # Owner DM defaults to the config.yaml global cap; override here if needed.
  # max_turns: 12

# Optional: add a personal cost guardrail even for owner-DM.
cost_budget:
  warn_at_percent: 80
  # monthly_usd: 100.0

hitl:
  enabled: true
  timeout_s: 300
  max_per_day: 5

nightly:
  model: opus

memory:
  # Channel IDs listed here are hidden from memory_search in every scope.
  # M5.6 will populate this for OQ31 opt-outs; empty is valid.
  excluded_channels: []

ask_user_question:
  enabled: true
  fallback: answer-as-self
