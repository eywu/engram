# Team/topic channel manifest template.
#
# Copied into contexts/<channel-id>/.claude/channel-manifest.yaml when a new
# channel is auto-provisioned. Status starts as `pending` — the operator
# must approve via `engram channels approve <channel-id>` before the bot
# responds.
#
# Default scope is exclusion-based: inherits the project-level toolkit
# minus a few write-side tools that are rarely safe in a shared channel.
# The operator can edit this file to tighten or relax the scope per channel.

channel_id: "{{channel_id}}"
identity: task-assistant
label: "{{channel_label}}"
status: pending        # operator must approve before bot responds

# Team channels use project-level priming, NOT user-level.
# Prevents the operator's personal MCPs / settings from leaking into a
# shared channel.
setting_sources: [project]

# Exclude write-side and shell tools by default. Team channels shouldn't
# get a shell unless the operator explicitly grants one.
tools:
  disallowed:
    - Bash
    - BashOutput
    - KillShell
    - Write
    - Edit
    - NotebookEdit

# Team channels must explicitly list privileged MCPs. Engram's own memory
# search is a base capability; remove it here and add it to `disallowed` only
# when a channel should not recall stored conversation history.
# To grant one, add the server name here and define its config in
# ~/.claude/mcp.json.
mcp_servers:
  allowed:
    - engram-memory

# Skills: inherit all by default. Exclude per-channel as needed.
skills: {}

# Permission rules (native Claude Code `Tool(specifier)` syntax).
# Aggressive deny list for shared channels — a coworker could innocently
# ask the bot to read a config file that contains secrets, and Slack would
# broadcast the answer to the whole channel. This list blocks the most
# common leak paths. Add more entries as your environment demands.
permissions:
  deny:
    # Personal credentials
    - "Read(~/.ssh/**)"
    - "Read(~/.aws/**)"
    - "Read(~/.gnupg/**)"
    - "Read(~/.config/**)"
    # Environment / dotenv files anywhere
    - "Read(**/.env*)"
    # Common secret directories
    - "Read(~/code/_secret/**)"
    # Shell history / keychain-like files
    - "Read(~/.zsh_history)"
    - "Read(~/.bash_history)"
    - "Read(~/Library/Keychains/**)"
    # Same patterns for Grep / Glob — searching inside secrets is as bad
    # as reading them directly.
    - "Grep(~/.ssh/**)"
    - "Grep(~/.aws/**)"
    - "Grep(**/.env*)"
    - "Glob(~/.ssh/**)"
    - "Glob(~/.aws/**)"
    - "Glob(**/.env*)"

behavior:
  style: concise
  permission_mode: default
  max_turns: 6

cost_budget:
  warn_at_percent: 80
  # daily_usd: 2.0
  # monthly_usd: 30.0

ask_user_question:
  enabled: true
  fallback: escalate-to-owner
